<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Helvetica;
  font-size: 16px;
}

#myVideo {
  position: top;
  right: 0;
  bottom: 0;
  height: auto;
  width: 100%; 
  
}

.content {
  position: fixed;
  bottom: 0;
  background: rgba(0, 0, 0, 0.5);
  color: #f1f1f1;
  width: 100%;
  padding: 20px;
}

#myBtn {
  width: 1oopx;
  font-size: 12px;
  padding: 10px;
  border: none;
  background: #000;
  color: #fff;
  cursor: pointer;
}

#myBtn:hover {
  background: #ddd;
  color: black;
}
</style>
</head>
<body>

<video autoplay loop id="myVideo">
  <source src="drill.mp4" type="video/mp4">
  Your browser does not support HTML5 video.
</video>

<div class="content">
  <h2>Microdrill</h2>
  <p>The resistance profile of a thin metal needle drilling through a tree trunk can be used for wood density approximation. The image was produced from a silver birch wood core collected at the exact spot where microdrill needle penetrated the trunk. </p>
  <button id="myBtn" onclick="myFunction()">Start</button>
</div>

<script>
var video = document.getElementById("myVideo");
var btn = document.getElementById("myBtn");

function myFunction() {
  if (video.paused) {
    video.play();
    btn.innerHTML = "Pause";
  } else {
    video.pause();
    btn.innerHTML = "Play";
  }
}
</script>

</body>
</html>
